name: CI Backend (Node + Prisma)

# Se ejecuta en CUALQUIER push a CUALQUIER rama y en Pull Requests
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 'npm ci' es como install pero más estricto y rápido para servidores
      - name: Instalar dependencias
        run: npm ci

      # Vital para que no falle TypeScript con tu base de datos
      - name: Generar cliente Prisma
        run: npx prisma generate

      # Nuevo paso: Verificar calidad de código (ESLint)
      - name: Linting (Calidad de código)
        run: npm run lint

      # Verifica que no haya errores de sintaxis/tipos
      - name: Verificar compilación (Build)
        run: npm run build --if-present