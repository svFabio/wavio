# ============================================================================
# Dependency Review
# ============================================================================
# Runs on pull requests only. Catches known vulnerabilities in newly added
# dependencies before they merge into dev/main.
#
# Requires: GitHub Dependency Graph enabled in repo Settings > Security.
# ============================================================================

name: Dependency Review

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
