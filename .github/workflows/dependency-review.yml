# ============================================================================
# Dependency Review
# ============================================================================
# Runs on pull requests only. Catches known vulnerabilities in newly added
# dependencies before they merge into dev/main.
# ============================================================================

name: Dependency Review

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review — Backend
        uses: actions/dependency-review-action@v4
        with:
          directory: ai-appointment-platform-backend
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: Dependency Review — Frontend
        uses: actions/dependency-review-action@v4
        with:
          directory: ai-appointment-platform-frontend
          fail-on-severity: high
          comment-summary-in-pr: always
