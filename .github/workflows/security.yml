# ============================================================================
# Security — CodeQL SAST
# ============================================================================
# Static application security analysis via GitHub CodeQL.
# Catches SQL injection, XSS, path traversal, prototype pollution, etc.
# Runs on push/PR to dev/main + weekly schedule.
#
# Status badges (add to README.md):
#   ![Security](https://github.com/<owner>/<repo>/actions/workflows/security.yml/badge.svg?branch=dev)
# ============================================================================

name: Security — CodeQL

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    - cron: '25 3 * * 1'  # Weekly Monday 3:25 AM

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none  # JS/TS doesn't need a build step for CodeQL
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
