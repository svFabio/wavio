# ============================================================================
# CI Pipeline — Wavio
# ============================================================================
# Runs on every push to dev/main and every pull request targeting dev/main.
# All jobs run in parallel — no cross-job dependencies at this stage.
#
# Status badges (add to README.md):
#   ![CI](https://github.com/<owner>/<repo>/actions/workflows/ci.yml/badge.svg?branch=dev)
# ============================================================================

name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11"

jobs:
  # ---------------------------------------------------------------------------
  # Type checking
  # ---------------------------------------------------------------------------

  typecheck-backend:
    name: Typecheck — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: npx prisma generate

      - run: pnpm run typecheck

  typecheck-frontend:
    name: Typecheck — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

  # ---------------------------------------------------------------------------
  # Linting
  # ---------------------------------------------------------------------------

  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  # ---------------------------------------------------------------------------
  # Formatting — checks both projects in a single job
  # ---------------------------------------------------------------------------

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            ai-appointment-platform-backend/pnpm-lock.yaml
            ai-appointment-platform-frontend/pnpm-lock.yaml

      # Install dependencies for both sub-projects
      - run: pnpm install --frozen-lockfile
        working-directory: ai-appointment-platform-backend

      - run: pnpm install --frozen-lockfile
        working-directory: ai-appointment-platform-frontend

      - run: pnpm run format:check
        working-directory: ai-appointment-platform-backend

      - run: pnpm run format:check
        working-directory: ai-appointment-platform-frontend

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------

  build-backend:
    name: Build — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Generate Prisma Client — required for the backend to compile
      - run: npx prisma generate

      - run: pnpm run build

  build-frontend:
    name: Build — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

  # ---------------------------------------------------------------------------
  # Prisma schema validation
  # ---------------------------------------------------------------------------

  prisma-validate:
    name: Prisma Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    defaults:
      run:
        working-directory: ai-appointment-platform-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ai-appointment-platform-backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: npx prisma validate

  # ---------------------------------------------------------------------------
  # Security audit — checks both sub-projects
  # ---------------------------------------------------------------------------

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            ai-appointment-platform-backend/pnpm-lock.yaml
            ai-appointment-platform-frontend/pnpm-lock.yaml

      - name: Audit backend
        working-directory: ai-appointment-platform-backend
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high

      - name: Audit frontend
        working-directory: ai-appointment-platform-frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high

  # ---------------------------------------------------------------------------
  # Docker Build — validates the backend Dockerfile builds successfully
  # ---------------------------------------------------------------------------

  docker-build:
    name: Docker Build — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-appointment-platform-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ai-appointment-platform-backend
          push: false
          tags: wavio-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
